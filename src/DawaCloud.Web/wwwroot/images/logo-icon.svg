<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="cl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
    <linearGradient id="ct" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>
  <!-- Cloud -->
  <g transform="translate(24,22)">
    <ellipse cx="0" cy="3" rx="14" ry="6.5" fill="url(#cl)" opacity="0.95"/>
    <circle cx="-7" cy="-1" r="6" fill="url(#cl)" opacity="0.95"/>
    <circle cx="2" cy="-4.5" r="7.5" fill="url(#cl)" opacity="0.95"/>
    <circle cx="8" cy="-1" r="5.5" fill="url(#cl)" opacity="0.95"/>
    <rect x="-14" y="0" width="28" height="9" rx="4.5" fill="url(#cl)" opacity="0.95"/>
  </g>
  <!-- Capsule -->
  <g transform="translate(24,18) rotate(-30)">
    <path d="M-2,-7 a2,2 0 0,1 4,0 v4.5 h-4 z" fill="url(#ct)"/>
    <path d="M-2,-2.5 h4 v4.5 a2,2 0 0,1 -4,0 z" fill="#fff" stroke="#e0e0e0" stroke-width="0.3"/>
  </g>
  <!-- DC text -->
  <text x="24" y="42" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="800" fill="#fff" opacity="0.85">DC</text>
</svg>
